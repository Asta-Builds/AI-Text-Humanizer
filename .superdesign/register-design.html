      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl h-full max-h-4xl pointer-events-none">

      </div>

      <!-- Form Card -->
      <div class="w-full max-w-md">
        <div class="bg-white border border-slate-200 rounded-[32px] shadow-2xl p-8 sm:p-10 relative">
          <div class="text-center mb-10">
            <h1 class="text-3xl font-display font-bold text-slate-900 tracking-tight mb-2">Cr├⌐er un compte</h1>
            <p class="text-slate-500 text-sm font-medium">Rejoignez l'├⌐lite acad├⌐mique aujourd'hui.</p>

              <div class="grid grid-cols-2 gap-2 p-1.5 bg-slate-50 rounded-2xl border border-slate-100">

                </button>

                  <iconify-icon icon="lucide:microscope"></iconify-icon>
                  Chercheur
                </button>
              </div>
            </div>

            <!-- Inputs -->
            <div class="space-y-4">
              <div class="space-y-2">
                <label for="full-name" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nom Complet</label>
                <div class="relative group">
                  <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                    <iconify-icon icon="lucide:user"></iconify-icon>
                  </div>
                  <input type="text" id="full-name" placeholder="Jean Dupont" class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-medium placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 transition-all">
                </div>
              </div>

              <div class="space-y-2">
                <label for="email" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Adresse E-mail</label>
                <div class="relative group">
                  <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                    <iconify-icon icon="lucide:mail"></iconify-icon>
                  </div>
                  <input type="email" id="email" placeholder="nom@universite.fr" class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-medium placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 transition-all">
                </div>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-2">
                  <label for="password" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mot de passe</label>
                  <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                      <iconify-icon icon="lucide:lock"></iconify-icon>
                    </div>
                    <input type="password" id="password" placeholder="ΓÇóΓÇóΓÇóΓÇóΓÇóΓÇóΓÇóΓÇó" class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-medium placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 transition-all">
                  </div>
                </div>
                <div class="space-y-2">
                  <label for="confirm-password" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Confirmer</label>
                  <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                      <iconify-icon icon="lucide:shield-check"></iconify-icon>
                    </div>
                    <input type="password" id="confirm-password" placeholder="ΓÇóΓÇóΓÇóΓÇóΓÇóΓÇóΓÇóΓÇó" class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm font-medium placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 transition-all">

            <!-- Terms -->
